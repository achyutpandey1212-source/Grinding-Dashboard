<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." class="search-input">
            <button id="searchBtn" class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </button>
        </div>

        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="cityName">Delhi</div>
            <div class="temperature" id="temperature">--°C</div>
            <div class="weather-desc" id="weatherDesc">Loading...</div>
            <div class="weather-details">
                <div class="detail-item">
                    <span class="detail-label">Feels Like</span>
                    <span class="detail-value" id="feelsLike">--°C</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Wind</span>
                    <span class="detail-value" id="wind">-- km/h</span>
                </div>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
